name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    fail-fast: false
    strategy:
      matrix:
        include:
          - runs_on: macos-14
            arch: arm64
            suffix: darwin-arm64
          - runs_on: macos-14
            arch: x86_64
            suffix: darwin-x86_64
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -1d /Applications/Xcode*.app | sort -V | tail -n 1)"
          sudo xcode-select -switch "$xcode_app/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build and package
        run: ./build.sh package ${{ matrix.arch }} ${{ github.ref_name }}

      - name: Upload release artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: dist/release/Forel-${{ github.ref_name }}-${{ matrix.suffix }}.dmg
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-14
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.dmg
          generate_release_notes: true
          prerelease: false
          body: |
            ## Forel ${{ github.ref_name }}

            Two builds available. Download the one that matches your Mac:
            - `Forel-${{ github.ref_name }}-darwin-arm64.dmg` Apple Silicon (M1 / M2 / M3 / M4)
            - `Forel-${{ github.ref_name }}-darwin-x86_64.dmg` for Intel

            Requires **macOS 14 Sonoma or later**.

            1. Download the correct .dmg for your Mac.
            2. Open it and drag **Forel** into **Applications**.
            3. First launch: the app is ad-hoc signed (not notarized), so right-click
               **Forel.app -> Open** and confirm. (Or run `xattr -cr /Applications/Forel.app`.)
