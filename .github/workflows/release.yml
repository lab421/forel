name: Release

# Publishes a universal (Intel + Apple Silicon) .dmg to a GitHub Release
# whenever a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    # macOS arm64 runner with full Xcode — builds the universal binary
    # (CGO cross-compiles amd64 + arm64, then lipo) and creates the .dmg.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build universal .dmg
        run: wails3 task dmg

      - name: Name the artifact after the tag
        run: mv bin/Forel.dmg "bin/Forel-${GITHUB_REF_NAME}-universal.dmg"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Forel-*-universal.dmg
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v0.1.0-alpha) are flagged as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Forel ${{ github.ref_name }}

            Universal build for **Intel & Apple Silicon** macOS (14 Sonoma or later).

            ### Install
            1. Download `Forel-${{ github.ref_name }}-universal.dmg` below.
            2. Open it and drag **Forel** into **Applications**.
            3. First launch: the app is ad-hoc signed (not notarized), so right-click
               **Forel.app → Open** and confirm. (Or run `xattr -cr /Applications/Forel.app`.)
